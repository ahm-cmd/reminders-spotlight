name: RemindersSpotlight
options:
  bundleIdPrefix: com.andrewmott
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.4.0"
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: "Reminders Spotlight"
targets:
  RemindersSpotlight:
    type: application
    platform: macOS
    sources:
      - path: reminders-menubar
        excludes:
          - "Services/UpdateService"
          - "Views/ToolbarView/UpdateAvailableButton.swift"
          - "*.entitlements"
          - "Info.plist"
    dependencies:
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewmott.reminders-menubar
        INFOPLIST_FILE: reminders-menubar/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "1.0.0"
